services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: backend-monitoring-rabbitmq
    restart: unless-stopped
    ports:
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: apps/Backend/Dockerfile
    container_name: backend-monitoring-backend
    restart: unless-stopped
    env_file:
      - ./apps/Backend/.env
    environment:
      NODE_ENV: production
      RABBITMQ_URL: amqp://rabbitmq:5672
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');const req=http.get('http://localhost:4000/metrics-debug',res=>process.exit(res.statusCode===200?0:1));req.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),5000);"]
      interval: 15s
      timeout: 6s
      retries: 5
      start_period: 20s
    depends_on:
      rabbitmq:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: backend-monitoring-dashboard
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  nginx-proxy:
    image: nginx:1.27-alpine
    container_name: backend-monitoring-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      dashboard:
        condition: service_started
